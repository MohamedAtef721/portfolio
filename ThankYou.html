<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Thank You | Mohamed Atef</title>
    <meta name="author" content="Mohamed Atef">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230f0f2a'/><text x='32' y='41' text-anchor='middle' font-size='28' font-family='Arial Black,sans-serif' font-weight='900' fill='%238b5cf6'>MA</text><line x1='16' y1='49' x2='48' y2='49' stroke='%238b5cf6' stroke-width='3' stroke-linecap='round'/></svg>">

    <style>
        :root {
            --bg-color: #f5f7ff;
            --text-color: #475569;
            --heading-color: rgb(0, 0, 0);
            --theme-color: #8b5cf6; 
            --card-bg-color: #ffffff;
            --card-border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #b446ef);
        }

        html[data-theme='dark'] {
            --bg-color: #0f0f2a; 
            --text-color: #94a3b8;
            --heading-color: #f8fafc;
            --theme-color: #a78bfa;
            --card-bg-color: #24243e;
            --card-border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Roboto Slab', serif;
            color: var(--heading-color);
            font-weight: 700;
        }

        .success-container {
            text-align: center;
            padding: 3rem;
            max-width: 600px;
        }

        .success-icon {
            width: 120px;
            height: 120px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease;
        }

        .success-icon i {
            font-size: 4rem;
            color: white;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .success-message {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 35px;
            background: var(--accent-gradient);
            color: white !important;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
            text-decoration: none;
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(139, 92, 246, 0.4);
            text-decoration: none;
        }

        .countdown {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 1.5rem;
            animation: fadeInUp 0.6s ease 0.8s both;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="success-title">Message Sent Successfully!</h1>
        <p class="success-message">
            Thank you for reaching out! I've received your message and will get back to you as soon as possible.
        </p>
        <a href="index.html" class="btn-home">
            <i class="fas fa-home"></i> Back to Home
        </a>
        <p class="countdown">Redirecting to home in <span id="timer">5</span> seconds...</p>
    </div>

    <script>
        // Apply saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Countdown timer
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
